# Install both pre-commit and pre-push hooks:
#   pre-commit install && pre-commit install --hook-type pre-push
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--skip, ".venv,*.json,*.csv,*.baseline,skill-packages,*.pyc,__pycache__",
               --ignore-words-list, "trough,ore,cna,acn,blok,hims,pont,claus,theses"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: '\.env$|\.json$|\.csv$|\.md$|\.zip$'

  # Project-specific pre-commit checks
  - repo: local
    hooks:
      - id: no-absolute-paths
        name: Detect absolute paths with usernames
        entry: python3 scripts/hooks/check_no_absolute_paths.py
        language: system
        types: [text]
        exclude: '\.git/|\.venv/|\.secrets\.baseline$|/tests?/|CLAUDE\.md$|check_no_absolute_paths\.py$'

      - id: skill-frontmatter
        name: Validate SKILL.md frontmatter
        entry: python3 scripts/hooks/check_skill_frontmatter.py
        language: system
        files: 'skills/.*/SKILL\.md$'

      - id: docs-completeness
        name: Check all skills have doc pages
        entry: python3 scripts/hooks/check_docs_completeness.py
        language: system
        files: 'skills/.*/SKILL\.md$|docs/.*/skills/.*\.md$'
        pass_filenames: false

      - id: validate-skills-index
        name: Validate skills-index.yaml against skills/ folder
        entry: python3 scripts/validate_skills_index.py
        language: system
        # Re-run whenever any of the SSoT inputs OR the validator/spec change.
        # pass_filenames: false → hook always validates the entire repo.
        files: '^(skills-index\.yaml|skills/[^/]+/SKILL\.md|workflows/.*\.yaml|scripts/validate_skills_index\.py|scripts/tests/test_validate_skills_index\.py|docs/dev/metadata-and-workflow-schema\.md)$'
        pass_filenames: false

      - id: workflow-docs-drift
        name: Workflow docs drift check (regenerate from workflows/*.yaml)
        entry: python3 scripts/generate_workflow_docs.py --check
        language: system
        # Fire on any input that affects rendered output: manifests, generator,
        # and the rendered docs themselves (so manual edits are caught).
        files: '^(workflows/.*\.yaml|scripts/generate_workflow_docs\.py|docs/(en|ja)/workflows\.md)$'
        pass_filenames: false

      - id: catalog-drift
        name: README + CLAUDE.md catalog drift check (regenerate from skills-index.yaml)
        entry: python3 scripts/generate_catalog_from_index.py --check
        language: system
        # Fire on any input that affects rendered output: index, generator,
        # and the target files themselves (catches manual edits between
        # sentinel markers).
        files: '^(skills-index\.yaml|scripts/generate_catalog_from_index\.py|README\.md|README\.ja\.md|CLAUDE\.md)$'
        pass_filenames: false

      - id: snapshot-check
        name: Navigator metadata snapshot drift check (regenerate from SSoT)
        entry: python3 skills/trading-skills-navigator/scripts/build_snapshot.py --check
        language: system
        # Fire on any SSoT input, the normalizer/builder, OR the bundled
        # snapshot itself (catches manual edits + stale Web-App fallback).
        # recommend.py is included because build_snapshot.py imports its
        # normalize_* functions — a normalization change must regen the snapshot.
        files: '^(skills-index\.yaml|workflows/.*\.yaml|skills/trading-skills-navigator/(assets/metadata_snapshot\.json|scripts/(build_snapshot|recommend)\.py))$'
        pass_filenames: false

      # Pre-push hook: run validator in --strict-workflows + --strict-metadata
      # mode. Pre-commit stays in default mode so quick edits aren't blocked,
      # but pushes must satisfy the stricter contract (workflow internal
      # consistency + populated metadata fields).
      - id: validate-skills-index-strict
        name: Validate skills-index.yaml + workflows + metadata (strict)
        entry: python3 scripts/validate_skills_index.py --strict-workflows --strict-metadata
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      # Pre-push hook: run all skill-level tests before pushing
      # Tests run per-skill to avoid module name collisions (scorer.py, helpers.py, etc.)
      - id: pytest-pre-push
        name: Run all skill tests
        entry: bash scripts/run_all_tests.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
