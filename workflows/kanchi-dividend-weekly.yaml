schema_version: 1
id: kanchi-dividend-weekly
display_name: Kanchi Dividend Weekly
display_name_ja: Kanchi式配当銘柄の週次選定
cadence: weekly
estimated_minutes: 60
target_users:
  - long-term-investor
  - dividend-investor
difficulty: intermediate
api_profile: mixed

when_to_run: >-
  Weekly, to source and underwrite new US-listed dividend candidates using
  Kanchi's 5-step method: screen for yield/quality, deep-dive the strongest
  names, and register a fully-documented candidate thesis before any entry.
  v1 covers US-listed dividend stocks only.
when_to_run_ja: >-
  Kanchiの5ステップ手法で米国上場の新規配当候補を抽出・精査するため、週次で実行する。
  利回りと品質でスクリーニングし、有力銘柄を詳細分析して、エントリー前に根拠を
  完全に記録した候補の投資仮説を登録する。v1は米国上場の配当株のみを対象とする。
when_not_to_run: >-
  Not for Japanese or other non-US-listed dividend stocks -- this workflow
  neither covers nor implies support for them in v1. Not a claim that
  Kanchi-style screening is a profitable strategy; it is a disciplined
  candidate-sourcing routine, not a signal to buy. Not for maintaining an
  existing holding -- that is core-portfolio-weekly's job (this workflow is
  for finding and underwriting NEW candidates). No order is ever placed
  automatically; every buy is entered manually at the broker.
when_not_to_run_ja: >-
  日本株や米国以外の市場に上場する配当株には使用しない。v1では対応せず、対応を示唆もしない。
  Kanchi式スクリーニングが収益性のある戦略だと主張するものではない。これは買いシグナルではなく、
  規律ある候補抽出手順である。既存保有銘柄の管理には使用しない。それは
  core-portfolio-weekly の役割であり、このワークフローは新規候補の発見と精査を目的とする。
  注文は自動発注せず、すべての買い注文をブローカーで手動入力する。

required_skills:
  - kanchi-dividend-sop
  - trader-memory-core
optional_skills:
  - value-dividend-screener
  - dividend-growth-pullback-screener
  - kanchi-dividend-us-tax-accounting
  - kanchi-dividend-review-monitor

# Optional source for existing-holding context used only by steps 4-5.
# Candidate underwriting in steps 1-3 does not require this workflow.
prerequisite_workflows:
  - id: core-portfolio-weekly
    artifact: holdings_snapshot
    rationale: >-
      Use its live holdings as the source when optional tax or review-monitor
      checks are requested. Normalize that snapshot to each skill's distinct
      manual input schema; skip steps 4-5 when no applicable input exists.
    rationale_ja: >-
      任意の税務またはレビュー監視チェックを行う場合、そのライブ保有情報を入力元として使う。
      各スキル固有の手動入力スキーマへ正規化し、該当する入力がなければステップ4と5を省略する。

manual_inputs:
  - id: tax_holdings_input
    required: false
    used_by_steps:
      - 4
    schema_ref: skills/kanchi-dividend-us-tax-accounting/references/input-schema.md
    description: >-
      Operator-supplied JSON with holdings[]. For a new candidate, provide a
      hypothetical intended account and leave hold_days_in_window absent so
      the result remains assumption-required rather than falsely confirmed.
    description_ja: >-
      holdings[] を含むオペレーター提供のJSON。新規候補では予定口座を仮定値として指定し、
      hold_days_in_window は省略する。これにより、結果を誤って確認済みにせず
      assumption-required のまま保持する。
  - id: review_monitor_input
    required: false
    used_by_steps:
      - 5
    schema_ref: skills/kanchi-dividend-review-monitor/references/input-schema.md
    description: >-
      Normalized existing-holding JSON with dividend and risk evidence. This
      is not derivable from a candidate ticker alone; skip step 5 for a new,
      not-yet-held name without monitoring evidence.
    description_ja: >-
      配当とリスクの証拠を含む、正規化済みの既存保有銘柄JSON。候補ティッカーだけからは
      導出できないため、まだ保有しておらず監視証拠がない新規銘柄ではステップ5を省略する。

artifacts:
  - id: high_yield_candidates
    produced_by_step: 1
    required: false
  - id: pullback_candidates
    produced_by_step: 2
    required: false
  - id: kanchi_candidates
    produced_by_step: 3
    required: true
  - id: stock_memo
    produced_by_step: 3
    required: true
  - id: account_location_advice
    produced_by_step: 4
    required: false
  - id: review_queue
    produced_by_step: 5
    required: false
  - id: thesis_record
    produced_by_step: 6
    required: true
    downstream_hints:
      - trade-memory-loop
      - monthly-performance-review

steps:
  - step: 1
    name: Screen for high-yield candidates
    name_ja: 高配当候補をスクリーニングする
    skill: value-dividend-screener
    optional: true
    produces:
      - high_yield_candidates
    decision_gate: false

  - step: 2
    name: Screen for dividend-growth pullbacks
    name_ja: 増配株の押し目候補をスクリーニングする
    skill: dividend-growth-pullback-screener
    optional: true
    produces:
      - pullback_candidates
    decision_gate: false

  - step: 3
    name: Run the Kanchi 5-step underwriting
    name_ja: Kanchiの5ステップ精査を実行する
    skill: kanchi-dividend-sop
    consumes:
      - high_yield_candidates
      - pullback_candidates
    produces:
      - kanchi_candidates
      - stock_memo
    decision_gate: true
    decision_question: >-
      For each candidate, does the Kanchi verdict reach an actionable tier
      (CLEAN-PASS / PASS-CAUTION / CONDITIONAL-PASS)? A HOLD-REVIEW,
      STEP1-RECHECK, or FAIL verdict is fail-closed -- it stops here, not
      forward to sizing or registration. Candidates may come from step 1/2
      screeners (use if available) or a manually supplied ticker list --
      neither screener is required to run this step.
    decision_question_ja: >-
      各候補のKanchi判定は実行可能な段階（CLEAN-PASS / PASS-CAUTION /
      CONDITIONAL-PASS）に達しているか。HOLD-REVIEW、STEP1-RECHECK、FAIL は
      fail-closed とし、サイズ計算や登録へ進めずここで停止する。候補はステップ1・2の
      スクリーナー出力を利用可能なら使うか、手動提供のティッカー一覧から取得できる。
      このステップの実行にどちらのスクリーナーも必須ではない。
    depends_on:
      - 1
      - 2

  - step: 4
    name: Check US tax and account-location treatment
    name_ja: 米国税務と口座配置の扱いを確認する
    skill: kanchi-dividend-us-tax-accounting
    optional: true
    produces:
      - account_location_advice
    decision_gate: false

  - step: 5
    name: Check existing-holding review triggers
    name_ja: 既存保有銘柄のレビュー条件を確認する
    skill: kanchi-dividend-review-monitor
    optional: true
    produces:
      - review_queue
    decision_gate: false

  - step: 6
    name: Register the candidate thesis
    name_ja: 候補の投資仮説を登録する
    skill: trader-memory-core
    consumes:
      - kanchi_candidates
      - stock_memo
      - account_location_advice
      - review_queue
    produces:
      - thesis_record
    decision_gate: true
    decision_question: >-
      For each actionable candidate, ingest the kanchi_candidates verdict as
      an IDEA thesis, then link the saved stock_memo file (and, if
      available, tax/account-location advice and any review-monitor flags)
      to it with thesis_store.link_report() so the fully-documented Kanchi
      memo is part of the auditable record, not just referenced in prose.
      Confirm no unresolved blockers, sizing, sector concentration, and
      tranche plan before entering an order. Never transition the thesis to
      ACTIVE until a real broker fill happens -- this step only reaches
      IDEA / ENTRY_READY.
    decision_question_ja: >-
      実行可能な各候補について、kanchi_candidates の判定を IDEA の投資仮説として
      取り込み、保存した stock_memo ファイルを thesis_store.link_report() で関連付ける。
      利用可能な場合は、税務・口座配置の助言とレビュー監視フラグも関連付け、根拠が完全に
      記録されたKanchiメモを、文章で参照するだけでなく監査可能な記録の一部にする。
      注文前に未解決の阻害要因、ポジションサイズ、セクター集中、分割買い計画を確認する。
      ブローカーで実際に約定するまで投資仮説を ACTIVE に移行しない。このステップは
      IDEA / ENTRY_READY までとする。
    depends_on:
      - 3
      - 4
      - 5

manual_review:
  - A HOLD-REVIEW, STEP1-RECHECK, or FAIL Kanchi verdict is fail-closed --
    it never advances to sizing or thesis registration.
  - The step-3 stock memo (`references/stock-note-template.md` in
    kanchi-dividend-sop, a hand-written one-pager) is not embedded in the
    kanchi_candidates JSON -- save it to a file, then after the IDEA thesis
    is registered, call
    `thesis_store.link_report(state_dir, thesis_id, "kanchi-dividend-sop",
    <memo_path>, date)` to attach it. Without this call the thesis has no
    documented memo in its `linked_reports`, even though one was written.
  - No order is ever placed automatically, and the thesis never
    auto-transitions to ACTIVE; every fill is entered manually at the
    broker, then recorded with open-position.
  - Screeners (steps 1-2) are optional -- a manually supplied ticker list is
    an equally valid path into step 3.
  - Tax and account-location advice (step 4) is advisory, not authoritative
    -- verify with a tax professional or the actual broker/custodian
    statements before acting on it.
  - Step 4 requires `tax_holdings_input` matching the linked schema; do not
    pass raw screener rows directly as tax holdings.
  - If review-monitor (step 5) flags an existing holding WARN or REVIEW,
    that only pauses additional buys in that name -- it never triggers an
    automatic sell.
  - Step 5 requires `review_monitor_input` matching its richer linked schema;
    a ticker-only candidate is insufficient and the optional step must be
    skipped rather than manufacturing missing evidence.
  - Screener outputs land under each skill's own `logs/` directory, not a
    shared `reports/` path; treat artifact ids as logical references, not
    literal filenames, when wiring steps together.
  - Command examples for dividend-growth-pullback-screener must use
    `screen_dividend_growth_rsi.py` -- `screen_dividend_growth.py` does not
    exist in this repository.
manual_review_ja:
  - Kanchi判定が HOLD-REVIEW、STEP1-RECHECK、FAIL の場合は fail-closed とし、サイズ計算や投資仮説登録へ進めない。
  - ステップ3の株式メモ（kanchi-dividend-sop の `references/stock-note-template.md` に基づく手書き1ページ）は kanchi_candidates JSON に埋め込まれない。ファイルへ保存し、IDEA の投資仮説登録後に `thesis_store.link_report(state_dir, thesis_id, "kanchi-dividend-sop", <memo_path>, date)` を呼び出して添付する。この呼び出しがなければ、メモを作成していても投資仮説の `linked_reports` に記録されない。
  - 注文を自動発注せず、投資仮説を自動で ACTIVE へ移行しない。すべての約定をブローカーで手動入力し、その後 open-position で記録する。
  - ステップ1・2のスクリーナーは任意であり、手動提供のティッカー一覧もステップ3への有効な入力とする。
  - ステップ4の税務・口座配置の助言は参考情報であり、権威ある判断ではない。行動前に税務専門家または実際のブローカー・カストディアン資料で確認する。
  - ステップ4にはリンク先スキーマに合う `tax_holdings_input` が必要であり、スクリーナーの未加工行を税務上の保有情報として直接渡さない。
  - ステップ5のレビュー監視が既存保有銘柄を WARN または REVIEW と判定した場合、その銘柄の買い増しだけを一時停止する。自動売却は行わない。
  - ステップ5には、より詳細なリンク先スキーマに合う `review_monitor_input` が必要である。ティッカーだけでは不十分なため、不足証拠を作り出さず任意ステップを省略する。
  - スクリーナー出力は共有 `reports/` ではなく各スキル固有の `logs/` 配下に保存される。ステップを連携するとき、成果物IDは実ファイル名ではなく論理参照として扱う。
  - dividend-growth-pullback-screener のコマンド例には `screen_dividend_growth_rsi.py` を使用する。`screen_dividend_growth.py` はこのリポジトリに存在しない。

journal_destination: trader-memory-core
