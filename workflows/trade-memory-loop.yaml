schema_version: 1
id: trade-memory-loop
display_name: Trade Memory Loop
display_name_ja: 取引記憶ループ
cadence: ad-hoc
estimated_minutes: 30
target_users:
  - part-time-swing-trader
  - long-term-investor
  - growth-investor
difficulty: beginner
api_profile: no-api-basic

when_to_run: >-
  Every time a position is closed (full or partial exit). Records the outcome,
  generates a postmortem, (optionally) coaches process / risk / execution /
  behavior patterns, and (optionally) re-validates the original hypothesis via
  backtest.
when_to_run_ja: >-
  ポジションを全決済または一部決済するたびに実行する。結果を記録して事後分析を作成し、
  任意でプロセス、リスク、執行、行動パターンを振り返り、元の仮説をバックテストで再検証する。
when_not_to_run: >-
  Do not run before a position is closed — use trader-memory-core directly to
  update an open thesis instead. Do not skip this loop after a closed trade,
  even on winners.
when_not_to_run_ja: >-
  ポジション決済前には実行しない。未決済の投資仮説を更新する場合は
  trader-memory-core を直接使用する。利益取引であっても、決済後にこのループを省略しない。

required_skills:
  - trader-memory-core
  - signal-postmortem
optional_skills:
  - trade-performance-coach
  - backtest-expert

artifacts:
  - id: closed_thesis_record
    produced_by_step: 1
    required: true
  - id: postmortem_findings
    produced_by_step: 2
    required: true
    downstream_hints:
      - monthly-performance-review
  - id: performance_coach_report
    produced_by_step: 3
    required: false
    downstream_hints:
      - monthly-performance-review
  - id: next_session_operating_rules
    produced_by_step: 3
    required: false
    downstream_hints:
      - monthly-performance-review
  - id: backtest_validation
    produced_by_step: 4
    required: false
  - id: lessons_log_entry
    produced_by_step: 5
    required: true
    downstream_hints:
      - monthly-performance-review

steps:
  - step: 1
    name: Record closed trade outcome
    name_ja: 決済済み取引の結果を記録する
    skill: trader-memory-core
    produces:
      - closed_thesis_record
    decision_gate: false

  - step: 2
    name: Generate postmortem
    name_ja: 事後分析を作成する
    skill: signal-postmortem
    consumes:
      - closed_thesis_record
    produces:
      - postmortem_findings
    decision_gate: true
    decision_question: >-
      What was the root cause of the outcome — thesis quality, execution,
      market environment, or randomness? Classify and document.
    decision_question_ja: >-
      結果の根本原因は、投資仮説の質、執行、市場環境、偶然性のどれか。
      分類して記録する。

  - step: 3
    name: Coach process, risk, and behavior patterns
    name_ja: プロセス、リスク、行動パターンを振り返る
    skill: trade-performance-coach
    optional: true
    consumes:
      - closed_thesis_record
      - postmortem_findings
    produces:
      - performance_coach_report
      - next_session_operating_rules
    decision_gate: true
    decision_question: >-
      Which next-session operating rules should the trader accept, modify,
      defer, or journal only?
    decision_question_ja: >-
      次の取引セッションの運用ルールのうち、採用、修正、保留、記録のみとするものはどれか。

  - step: 4
    name: Re-validate hypothesis via backtest
    name_ja: バックテストで仮説を再検証する
    skill: backtest-expert
    optional: true
    consumes:
      - postmortem_findings
    produces:
      - backtest_validation
    decision_gate: false

  - step: 5
    name: Append lessons to journal
    name_ja: 学びを記録に追記する
    skill: trader-memory-core
    consumes:
      - postmortem_findings
      - backtest_validation
    produces:
      - lessons_log_entry
    decision_gate: false

manual_review:
  - Be honest about whether the win was thesis-driven or lucky.
  - Be honest about whether the loss was thesis-flawed or executed poorly.
  - Don't rationalize randomness as either skill or failure.
manual_review_ja:
  - 利益が投資仮説によるものか、単なる幸運かを正直に評価する。
  - 損失が投資仮説の欠陥によるものか、執行不良によるものかを正直に評価する。
  - 偶然を技量や失敗として都合よく解釈しない。

journal_destination: trader-memory-core
